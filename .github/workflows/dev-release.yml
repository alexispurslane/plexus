name: Dev Release

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - 'packages/**/*.lock'
      - 'packages/**/*.json'
      - '*.yaml'
      - '*.yml'
  workflow_dispatch:

jobs:
  dev-release:
    name: Dev Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Base dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Install Backend dependencies
        run: bun install --frozen-lockfile
        working-directory: ./packages/backend

      - name: Install Frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: ./packages/frontend

      - name: Compile Binaries
        # compiling each platform separately
        # Note: Each compile script in package.json runs build:frontend.
        # This is acceptable for correctness to ensure each binary is built with the latest assets.
        env:
          APP_VERSION: dev-${{ github.sha }}
        run: |
          bun run compile:linux
          bun run compile:macos
          bun run compile:windows

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:dev
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=dev-${{ github.sha }}

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plexus-linux
            plexus-macos
            plexus.exe
          draft: false
          prerelease: true
          tag_name: dev-${{ github.sha }}
          body: |
            Development pre-release from commit ${{ github.sha }}

            Built from: `${{ github.ref }}` at `${{ github.sha }}`
